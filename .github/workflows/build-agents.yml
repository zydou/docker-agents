---
name: Build Agents
run-name: codex-${{ inputs.codex_version || 'latest' }} & claude-${{ inputs.claude_version || 'latest' }}

on:
  workflow_dispatch:
    inputs:
      codex_version:
        description: Codex version (e.g. 0.142.4)
        required: false
        default: latest
      claude_version:
        description: Claude Code version (e.g. 2.1.193)
        required: false
        default: latest
  push:
    paths:
      - agents.Dockerfile
      - .github/workflows/build-agents.yml

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: codex
            version: ${{ inputs.codex_version || 'latest' }}
          - target: claude
            version: ${{ inputs.claude_version || 'latest' }}
          - target: latest
            version: ""
    steps:
      - uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22  # v7
      - name: Prepare tags
        id: tags
        run: |
          TARGET="${{ matrix.target }}"
          VERSION="${{ matrix.version }}"
          REGISTRY="ghcr.io/${{ github.repository }}"
          TAG_LIST="${REGISTRY}:${TARGET}"
          if [ -n "$VERSION" ]; then
          TAG_LIST="${TAG_LIST},${REGISTRY}:${TARGET}-${VERSION}"
          fi
          echo "tags=${TAG_LIST}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@17f7c1809f7467d4244b4ff01b0dbe0b8b9e3d43  # v4
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
      - uses: docker/setup-qemu-action@451542b03ae7946b7082a398b11c8c315a0e4e80  # v4
      - uses: docker/setup-buildx-action@bed9a68598762c1a47e745eb5edc904490f2411b  # v4
      - name: Build and push
        uses: docker/build-push-action@b99c92828ab902cd2c54088e778f547a66bf746f  # v7
        with:
          context: .
          file: agents.Dockerfile
          build-args: |
            CODEX_VERSION=${{ inputs.codex_version || 'latest' }}
            CLAUDE_CODE_VERSION=${{ inputs.claude_version || 'latest' }}
          target: ${{ matrix.target }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          sbom: false
          tags: ${{ steps.tags.outputs.tags }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
